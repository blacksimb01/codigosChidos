<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Comprometido</title>

<style>
    body {
        margin: 0;
        background: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        overflow: hidden;
        cursor: none;
    }

    #terminal {
        padding: 20px;
        font-size: 18px;
        white-space: pre-line;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    #startScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
        color: #00ff00;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
    }
</style>
</head>

<body>

<div id="startScreen">
    Presiona cualquier tecla para continuar...
</div>

<div id="terminal"></div>

<script>
    const lines = [
        "Inicializando protocolo...",
        "Conectando a servidor remoto...",
        "Acceso concedido.",
        "Iniciando extracción de datos...",
        "Robando contraseñas...",
        "Accediendo a cámara...",
        "Accediendo a micrófono...",
        "Subiendo archivos al servidor...",
        "Transferencia 25%...",
        "Transferencia 57%...",
        "Transferencia 89%...",
        "Transferencia 100%...",
        "Sistema comprometido.",
        "Datos enviados exitosamente."
    ];

    const terminal = document.getElementById("terminal");
    const startScreen = document.getElementById("startScreen");

    let i = 0;

    function typeLine() {
        if (i < lines.length) {
            terminal.innerHTML += "> " + lines[i] + "\n";
            i++;
            setTimeout(typeLine, 900);
        } else {
            terminal.innerHTML += "\n> ERROR CRÍTICO <span class='blink'>█</span>";
        }
    }

    function startHack() {
        startScreen.style.display = "none";

        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        setTimeout(typeLine, 1000);
    }

    document.addEventListener("keydown", startHack, { once: true });
    document.addEventListener("click", startHack, { once: true });

</script>

</body>
</html>
