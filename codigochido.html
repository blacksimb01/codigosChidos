<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Comprometido</title>

<style>
    body {
        margin: 0;
        background: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        overflow: hidden;
        cursor: none;
        transition: background 0.5s;
    }

    #terminal {
        padding: 20px;
        font-size: 18px;
        white-space: pre-line;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    #startScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
        color: #00ff00;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
    }
</style>
</head>

<body>

<div id="startScreen">
    Presiona cualquier tecla para continuar...
</div>

<div id="terminal"></div>

<audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const lines = [
"Inicializando protocolo NSA...",
"Conectando a servidor remoto...",
"IP detectada: 192.168.0." + Math.floor(Math.random()*255),
"Ubicación rastreada...",
"Acceso concedido.",
"Iniciando extracción de datos...",
"Robando contraseñas guardadas...",
"Accediendo a cámara...",
"Accediendo a micrófono...",
"Copiando fotos privadas...",
"Subiendo archivos al servidor...",
"Transferencia 12%...",
"Transferencia 37%...",
"Transferencia 64%...",
"Transferencia 89%...",
"Transferencia 100%...",
"Sistema comprometido.",
"Datos enviados exitosamente."
];

const terminal = document.getElementById("terminal");
const startScreen = document.getElementById("startScreen");
const alarm = document.getElementById("alarm");

let i = 0;

function typeLine() {
    if (i < lines.length) {
        terminal.innerHTML += "> " + lines[i] + "\n";
        i++;
        setTimeout(typeLine, 800);
    } else {
        triggerFinal();
    }
}

function triggerFinal() {
    document.body.style.background = "darkred";
    alarm.play();
    terminal.innerHTML += "\n\n> ERROR CRÍTICO █";
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function startHack() {
    startScreen.style.display = "none";

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    setTimeout(typeLine, 1000);
}

document.addEventListener("keydown", startHack, { once: true });
document.addEventListener("click", startHack, { once: true });

</script>

</body>
</html>
